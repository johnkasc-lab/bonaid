name: bonaid

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bonaid}
      POSTGRES_USER: ${POSTGRES_USER:-bonaid}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bonaid_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - bonaid_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bonaid}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - bonaid_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    profiles: ["llm"]  # NOT started by a plain `docker compose up` anymore -
                        # opt in explicitly with `docker compose --profile llm up -d ollama`
                        # when you actually want LLM narration/scoring. Every
                        # agent (Technical, News) already falls back gracefully
                        # when Ollama isn't reachable, so this is a safe default
                        # for machines with limited RAM.
    ports:
      - "11434:11434"
    volumes:
      - bonaid_ollama:/root/.ollama
    # Uncomment to enable GPU acceleration (requires nvidia-container-toolkit):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      # ollama intentionally NOT listed here - it's optional (see profiles
      # above). The app already handles "Ollama unreachable" gracefully.
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      OLLAMA_HOST: http://ollama:11434
      POSTGRES_DB: ${POSTGRES_DB:-bonaid}
      POSTGRES_USER: ${POSTGRES_USER:-bonaid}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bonaid_dev_password}
    env_file:
      - ../.env
    # The image's ENTRYPOINT is ["bonaid"] (see docker/Dockerfile) - without
    # clearing it here, `command` gets appended AFTER it (e.g. "bonaid tail
    # -f /dev/null", which isn't a valid subcommand and crash-loops). This
    # keeps the container alive so you can `docker compose exec app bonaid
    # <command>` on demand, rather than the container running one command
    # once and exiting.
    entrypoint: []
    command: ["tail", "-f", "/dev/null"]
    tty: true
    stdin_open: true

  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      OLLAMA_HOST: http://ollama:11434
      POSTGRES_DB: ${POSTGRES_DB:-bonaid}
      POSTGRES_USER: ${POSTGRES_USER:-bonaid}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bonaid_dev_password}
    env_file:
      - ../.env
    ports:
      - "8000:8000"
    # Same entrypoint-clearing note as `app` above applies here - overriding
    # both entrypoint AND command to run uvicorn directly instead of the
    # `bonaid` CLI.
    entrypoint: []
    command: ["uvicorn", "bonaid.dashboard.main:app", "--host", "0.0.0.0", "--port", "8000"]

volumes:
  bonaid_pgdata:
  bonaid_redisdata:
  bonaid_ollama:
